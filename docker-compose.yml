version: '3.8'

services:
  db-container:
    image: mysql:8.0
    container_name: db-container
    environment:
      MYSQL_ROOT_PASSWORD: "Hello@123"
      MYSQL_DATABASE: "A-LOU_Chumdararith-db"
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

  web-container:
    image: eclipse-temurin:21-jdk
    container_name: web-container
    ports:
      - "8443:8443"  # Website port
      - "2222:2222"  # SSH port
    volumes:
      - .:/app
    working_dir: /app
    command: >
      /bin/bash -c "
      export DEBIAN_FRONTEND=noninteractive &&
      apt-get update && apt-get install -y nginx openssh-server php-cli git curl maven default-mysql-client &&
      echo 'server { listen 8443; location / { proxy_pass http://127.0.0.1:8080; } }' > /etc/nginx/sites-available/default &&
      service nginx restart &&
      mkdir -p /var/run/sshd &&
      echo 'root:Hello@123' | chpasswd &&
      ssh-keygen -A &&
      git config --global --add safe.directory /app &&
      /usr/sbin/sshd -D -p 2222 -o PermitRootLogin=yes -o PasswordAuthentication=yes -o UsePAM=no
      "
    restart: unless-stopped
  
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin-container
    environment:
      PMA_HOST: db-container      
      MYSQL_ROOT_PASSWORD: "Hello@123"
    ports:
      - "8081:80"                  
    depends_on:
      - db-container
    restart: unless-stopped

volumes:
  mysql_data: