name: Java CI/CD Pipeline with GitHub Actions

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout repository code
        uses: actions/checkout@v4

      - name: 2. Set up Java JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: 3. Run localized unit tests with SQLite configuration
        run: mvn clean test -Dspring.profiles.active=test

      - name: 4. Install Ansible and SSH dependencies on the runner
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible sshpass

      - name: 5. Start Docker Compose Environment
        run: docker compose up -d

      - name: 6. Wait for SSH service to be ready
        run: |
          echo "Waiting for container initialization and SSH availability..."
          until nc -z 127.0.0.1 2222; do
            echo "SSH port 2222 is not ready yet. Sleeping 5 seconds..."
            sleep 5
          done
          echo "SSH port is open! Giving the service 5 more seconds to initialize protocol handshakes..."
          sleep 5

      - name: 7. Run Ansible Playbook to Deploy
        run: ansible-playbook -i inventory.ini deploy-playbook.yml

      - name: 8. Send failure email notification
        if: failure() # This step executes automatically if ANY of the steps above fail
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "BUILD FAILED: Job '${{ github.workflow }}' [Build #${{ github.run_number }}]"
          body: |
            The build pipeline has encountered an error.
            Please review the live console logs at: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          to: srengty@gmail.com, ${{ github.event.head_commit.author.email }} 
          from: GitHub Actions Automation